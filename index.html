<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="game">
            <div class="header"><h3>Calculator</h3></div>
            <div class="display">
                <input id="disid" type="text" placeholder="0" dir="rtl">
                
            </div>
            <div class="buttons">             
                <button class="ele" id="7">7</button>
                <button class="ele" id="8">8</button>
                <button class="ele" id="9">9</button>
                <button class="ele" id="*">*</button>
                <button class="ele" id="4">4</button>
                <button class="ele" id="5">5</button>
                <button class="ele" id="6">6</button>
                <button class="ele" id="-">-</button>
                <button class="ele" id="1">1</button>
                <button class="ele" id="2">2</button>
                <button class="ele" id="3">3</button>
                <button class="ele" id="+">+</button>
                <button class="ele" id="0">0</button>
                <button class="ele" id=".">.</button>
                <button class="ele" id="CE">CE</button>
                <button class="ele" id="=">=</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
